name: keybae
description: Keybae — Flutter client for KeyCase. Manage your cryptographic identity.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  keycase_core:
    git:
      url: https://github.com/keycase/core.git

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
