name: keybae
description: Keybae — Flutter client for KeyCase. Manage your cryptographic identity.
version: 0.1.0
publish_to: 'none'

environment:
  sdk: ^3.0.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  http: ^1.2.0
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0
  path_provider: ^2.1.0
  cryptography: ^2.7.0
  web_socket_channel: ^3.0.0
  keycase_core:
    path: ../core

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
